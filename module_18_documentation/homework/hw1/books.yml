swagger: "2.0"
info:
  title: Books API
  version: "1.0"
paths:
  /api/books/:
    post:
      summary: Создать книгу
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Book'
      responses:
        201:
          description: Книга создана
  /api/books/{id}:
    get:
      summary: Получить книгу по ID
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Книга найдена
          schema:
            $ref: '#/definitions/Book'
        404:
          description: Книга не найдена
    put:
      summary: Обновить книгу по ID
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Book'
      responses:
        200:
          description: Книга обновлена
        404:
          description: Автор не найден
    delete:
      summary: Удалить книгу по ID
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Книга удалена
        404:
          description: Книга не найдена
definitions:
  Book:
    type: object
    properties:
      id:
        type: integer
      title:
        type: string
      author_id:
        type: integer